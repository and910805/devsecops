rules:
  - id: js-eval-usage
    message: "Avoid eval(); 會造成任意程式碼執行風險"
    severity: HIGH
    languages: [javascript, typescript]
    pattern: eval(...)

  - id: dom-innerhtml-assignment
    message: "直接賦值 innerHTML 可能造成 XSS，請先淨化或改用 textContent"
    severity: HIGH
    languages: [javascript, typescript]
    pattern: $EL.innerHTML = $X

  - id: document-write-usage
    message: "避免使用 document.write()，容易引入 XSS/不受控內容"
    severity: MEDIUM
    languages: [javascript, typescript]
    pattern: document.write(...)

  - id: open-redirect-location-href
    message: "未驗證來源即導頁（Open Redirect）"
    severity: HIGH
    languages: [javascript, typescript]
    patterns:
      - pattern: location.href = $X

  - id: window-open-noopener
    message: "window.open 需搭配 rel=noopener / noreferrer 以避免 tabnabbing"
    severity: MEDIUM
    languages: [javascript, typescript]
    pattern: window.open($URL, "_blank")

  - id: fetch-http-insecure
    message: "以 HTTP 傳輸可能遭竊聽/竄改，請改用 HTTPS"
    severity: HIGH
    languages: [javascript, typescript]
    patterns:
      - pattern: fetch($U, ...)
      - metavariable-regex:
          metavariable: $U
          regex: "^['\"]http://"

  - id: localstorage-token
    message: "避免將 Token/JWT 存在 localStorage，建議改用 httpOnly Cookie"
    severity: MEDIUM
    languages: [javascript, typescript]
    patterns:
      - pattern: localStorage.setItem($K, $V)
      - metavariable-regex:
          metavariable: $K
          regex: "(?i)(token|jwt|auth)"