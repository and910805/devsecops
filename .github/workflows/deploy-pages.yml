name: Deploy to GitHub Pages
on:
  push:
    branches: [ "mainer" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Upload site as artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: upload
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Deploy to Pages
        id: deploy
        uses: actions/deploy-pages@v4
