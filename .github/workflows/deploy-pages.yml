name: Deploy to GitHub Pages

on:
  push:
    branches: [ "mainer" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 上傳 site 作為部署產物
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: upload
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: 部署到 Pages
        id: deploy
        uses: actions/deploy-pages@v4
