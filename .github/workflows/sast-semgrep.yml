name: SAST - Semgrep (HTML Demo)

on:
  pull_request:
    branches: [ "main", "mainer" ]
  push:
    branches: [ "main", "mainer" ]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  semgrep:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Semgrep
        run: pip install --upgrade semgrep jq

      # Run scan，即使有 Findings 也繼續（避免中斷 SARIF 上傳）
      - name: Run Semgrep
        id: semgrep_scan
        continue-on-error: true
        run: |
          semgrep scan \
            --include '**/*.js' \
            --include '**/*.ts' \
            --include '**/*.tsx' \
            --include '**/*.jsx' \
            --include '**/*.html' \
            --config p/owasp-top-ten \
            --config .semgrep/custom-rules.yml \
            --sarif-output=semgrep.sarif \
            --error

      # 一律上傳 SARIF
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif

      - name: Keep artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep.sarif
          path: semgrep.sarif

      # 最後根據 SARIF 內容決定 fail
      - name: Fail if findings > 0
        if: always()
        run: |
          COUNT=$(jq '.runs[0].results | length' semgrep.sarif)
          echo "Semgrep findings: $COUNT"
          if [ "$COUNT" -gt 0 ]; then
            echo "Failing the job due to findings."
            exit 1
          fi
