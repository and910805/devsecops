name: DevSecOps – SCA (Trivy)

on:
  push:
    branches: [ "main", "mainer" ]
  pull_request:
    branches: [ "main", "mainer" ]
  workflow_dispatch:

jobs:
  sca:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    env:
      # 換成 GHCR 鏡像，常比官方 S3 穩定
      TRIVY_DB_REPOSITORY: ghcr.io/aquasecurity/trivy-db:2
      TRIVY_JAVA_DB_REPOSITORY: ghcr.io/aquasecurity/trivy-java-db:1
      TRIVY_TIMEOUT: 5m
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ① 產生 SARIF，上傳到 Security → Code scanning alerts
      - name: Trivy SCA (requirements → SARIF)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: 'fs'
          scanners: 'vuln'
          vuln-type: 'library'
          list-all-pkgs: true
          severity: 'MEDIUM,HIGH,CRITICAL'
          ignore-unfixed: true
          format: 'sarif'
          output: 'trivy.sarif'
          file-patterns: 'requirements:requirements.txt'
          limit-severities-for-sarif: true
          exit-code: '0'   # 教學先不擋；要卡 PR 改 '1'

      - name: Trivy SCA (table for debug)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: 'fs'
          scanners: 'vuln'
          vuln-type: 'library'
          list-all-pkgs: true
          severity: 'LOW,MEDIUM,HIGH,CRITICAL'
          ignore-unfixed: true
          format: 'table'
          output: '-'                    # 印到日誌
          file-patterns: 'requirements:requirements.txt'
          exit-code: '0'

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy.sarif'
