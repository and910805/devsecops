name: DevSecOps – SCA (Trivy)

on:
  push:
    branches: [ "main", "mainer" ]
  pull_request:
    branches: [ "main", "mainer" ]
  workflow_dispatch:

jobs:
  sca:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Trivy CLI
        run: |
          sudo apt-get update -y
          sudo apt-get install -y wget
          wget -qO trivy.deb https://github.com/aquasecurity/trivy/releases/latest/download/trivy_0.55.0_Linux-64bit.deb
          sudo dpkg -i trivy.deb

      - name: Trivy DB Update
        run: trivy image --download-db-only --no-progress

      - name: Trivy SCA (requirements → SARIF)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: 'fs'
          scanners: 'vuln'
          vuln-type: 'library'
          list-all-pkgs: true
          severity: 'MEDIUM,HIGH,CRITICAL'
          ignore-unfixed: true
          format: 'sarif'
          output: 'trivy.sarif'
          file-patterns: 'requirements:requirements.txt'
          limit-severities-for-sarif: true
          exit-code: '0'   # 教學階
